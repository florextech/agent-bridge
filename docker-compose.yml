services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - api-data:/app/data
    environment:
      - DB_PATH=/app/data/agent-bridge.db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api

volumes:
  api-data:
